services:
  postgres:
    image: postgres:16.4-alpine3.20
    container_name: hb_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -h localhost -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s
    logging:
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "${DB_PORT}:${DB_PORT}"
    networks:
      - rp-network
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: hotel_app
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    expose:
      - ${SERVER_PORT}
    networks:
      - rp-network
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    volumes:
      - .:/app


volumes:
  redis_data:
    name: redis_data_volume
  db_data:
    name: my_db_data_volume
  export_data:
    name: export_data_volume
    external: true

networks:
  rp-network:
    external: false